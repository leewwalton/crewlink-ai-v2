version: 1
applications:
  - appRoot: apps/web
    backend:
      phases:
        build:
          commands:
            - echo "Infrastructure deploys in frontend preBuild from monorepo root"

    frontend:
      phases:
        preBuild:
          commands:
            # Each command runs in its own shell; cd + install/deploy in one block.
            # Do not use buildPath: / here — it breaks npm ci lockfile resolution.
            - |
              set -eo pipefail
              cd "$CODEBUILD_SRC_DIR"
              npm ci --cache .npm --prefer-offline
              npx cdk deploy CrewLinkStack --require-approval never --outputs-file cdk-deploy-outputs.json
              node apps/web/scripts/generate-outputs-from-cdk.js cdk-deploy-outputs.json
              test -f amplify_outputs.json || (echo "ERROR amplify_outputs.json not generated" && exit 1)
              test -f cdk-outputs.json || (echo "ERROR cdk-outputs.json not generated" && exit 1)
        build:
          commands:
            - cd "$CODEBUILD_SRC_DIR" && npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - ../../.npm/**/*
          - ../../node_modules/**/*
          - .next/cache/**/*
          - ../../packages/domain/dist/**/*
