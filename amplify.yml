version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - |
              set -euo pipefail
              if [ -f "$CODEBUILD_SRC_DIR/crewlink-ai-v2/cdk.json" ]; then
                export REPO_ROOT="$CODEBUILD_SRC_DIR/crewlink-ai-v2"
              elif [ -f "$CODEBUILD_SRC_DIR/cdk.json" ]; then
                export REPO_ROOT="$CODEBUILD_SRC_DIR"
              elif [ -f "crewlink-ai-v2/cdk.json" ]; then
                export REPO_ROOT="$(pwd)/crewlink-ai-v2"
              elif [ -f "cdk.json" ]; then
                export REPO_ROOT="$(pwd)"
              else
                echo "ERROR: could not locate cdk.json from PWD=$PWD CODEBUILD_SRC_DIR=${CODEBUILD_SRC_DIR:-unset}"
                exit 1
              fi
              cd "$REPO_ROOT"
              echo "REPO_ROOT=$REPO_ROOT"
              test -f cdk.json
              npm ci --cache .npm --prefer-offline
              npm run cdk:deploy:amplify
              npm run build -w @crewlink/domain
        build:
          commands:
            - |
              set -euo pipefail
              if [ -f "$CODEBUILD_SRC_DIR/crewlink-ai-v2/cdk.json" ]; then
                export REPO_ROOT="$CODEBUILD_SRC_DIR/crewlink-ai-v2"
              elif [ -f "$CODEBUILD_SRC_DIR/cdk.json" ]; then
                export REPO_ROOT="$CODEBUILD_SRC_DIR"
              elif [ -f "crewlink-ai-v2/cdk.json" ]; then
                export REPO_ROOT="$(pwd)/crewlink-ai-v2"
              elif [ -f "cdk.json" ]; then
                export REPO_ROOT="$(pwd)"
              else
                echo "ERROR: could not locate cdk.json from PWD=$PWD CODEBUILD_SRC_DIR=${CODEBUILD_SRC_DIR:-unset}"
                exit 1
              fi
              cd "$REPO_ROOT/apps/web"
              echo "REPO_ROOT=$REPO_ROOT"
              npm run build
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - "**/*"
      cache:
        paths:
          - .npm/**/*
          - node_modules/**/*
          - apps/web/.next/cache/**/*
          - packages/domain/dist/**/*
