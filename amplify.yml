version: 1
applications:
  - appRoot: apps/web
    backend:
      phases:
        build:
          commands:
            - echo "CDK deploy runs in frontend preBuild from monorepo root (buildPath /)"

    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            # buildPath / + single shell block: full monorepo root, fail fast on errors.
            - |
              set -eo pipefail
              cd "$CODEBUILD_SRC_DIR"
              npm ci --cache .npm --prefer-offline
              npx cdk deploy CrewLinkStack --require-approval never --outputs-file cdk-deploy-outputs.json
              node apps/web/scripts/generate-outputs-from-cdk.js cdk-deploy-outputs.json
              test -f amplify_outputs.json || (echo "ERROR amplify_outputs.json not generated" && exit 1)
              test -f cdk-outputs.json || (echo "ERROR cdk-outputs.json not generated" && exit 1)
        build:
          commands:
            - cd "$CODEBUILD_SRC_DIR" && npm run build
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - "**/*"
      cache:
        paths:
          - .npm/**/*
          - node_modules/**/*
          - apps/web/.next/cache/**/*
          - apps/web/node_modules/**/*
          - packages/domain/dist/**/*
