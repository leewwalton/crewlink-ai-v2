version: 1
applications:
  - appRoot: apps/web
    backend:
      phases:
        build:
          commands:
            - cd $CODEBUILD_SRC_DIR/crewlink-ai-v2
            - npm ci --cache .npm --prefer-offline
            - npx cdk deploy CrewLinkPipelineStack --require-approval never --outputs-file cdk-deploy-outputs.json
            - echo Generating amplify_outputs.json and cdk-outputs.json from CDK outputs
            - node scripts/generate-outputs-from-cdk.js cdk-deploy-outputs.json
            - echo Verifying outputs
            - test -f amplify_outputs.json || (echo "ERROR amplify_outputs.json not generated" && exit 1)
            - test -f cdk-outputs.json || (echo "ERROR cdk-outputs.json not generated" && exit 1)
            - echo "Auth user_pool_id=$(node -p "require('./amplify_outputs.json').auth.user_pool_id")"

    frontend:
      buildPath: apps/web
      phases:
        preBuild:
          commands:
            - cd $CODEBUILD_SRC_DIR/crewlink-ai-v2
            - |
              if [ ! -f amplify_outputs.json ]; then
                echo "amplify_outputs.json not found; fetching from stack outputs"
                node scripts/generate-outputs-from-cdk.js || true
              fi
            - npm ci --cache .npm --prefer-offline
            - npm run build -w @crewlink/domain
        build:
          commands:
            - cd $CODEBUILD_SRC_DIR/crewlink-ai-v2/apps/web
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - .next/cache/**/*
          - $CODEBUILD_SRC_DIR/crewlink-ai-v2/.npm/**/*
          - node_modules/**/*
          - $CODEBUILD_SRC_DIR/crewlink-ai-v2/node_modules/**/*
          - $CODEBUILD_SRC_DIR/crewlink-ai-v2/packages/domain/dist/**/*
