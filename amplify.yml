version: 1
applications:
  - appRoot: apps/web
    backend:
      phases:
        build:
          commands:
            - cd $CODEBUILD_SRC_DIR
            - npm ci --cache .npm --prefer-offline
            # Deploy backend via CDK (Cognito, DynamoDB, HTTP API, Lambdas)
            - npx cdk deploy CrewLinkStack --require-approval never --outputs-file cdk-deploy-outputs.json
            - echo Generating amplify_outputs.json and cdk-outputs.json from CDK outputs
            - node scripts/generate-outputs-from-cdk.js cdk-deploy-outputs.json
            - echo Verifying outputs
            - test -f amplify_outputs.json || (echo "ERROR amplify_outputs.json not generated" && exit 1)
            - test -f cdk-outputs.json || (echo "ERROR cdk-outputs.json not generated" && exit 1)

    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - cd $CODEBUILD_SRC_DIR
            - |
              if [ ! -f cdk-outputs.json ]; then
                echo "cdk-outputs.json not found; fetching from stack outputs"
                node scripts/generate-outputs-from-cdk.js || true
              fi
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - "**/*"
      cache:
        paths:
          - .npm/**/*
          - node_modules/**/*
          - apps/web/.next/cache/**/*
          - apps/web/node_modules/**/*
          - packages/domain/dist/**/*
